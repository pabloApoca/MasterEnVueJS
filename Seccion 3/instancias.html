<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>
	<link rel="stylesheet" href="style.css">
</head>

<body>
	<header id="vueTitle">
	</header>

	<section id="content">
		<main id="vueMain">
			<h1 ref="myH1" id="myH1">{{ name }}</h1>
			<p ref="myP">Valor: {{ valor }}</p>
			<button @click="sumar" ref="myBtn">Sumar</button>
			<button @click="restar">Restar</button>
			<button @click="destruir">Destruir</button>
		</main>

		<aside id="vueAside">
			<h1>{{ name }}</h1>
			<p>Valor: {{ valor }}</p>
			<button @click="sumar">Sumar</button>
			<button @click="restar">Restar</button>
		</aside>
	</section>
	<script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.js"></script>

	<script>
		const vueMain = new Vue({
			el: '#vueMain',
			data: {
				name: 'Instancia 01',
				valor: 5
			},
			methods: {
				sumar() {
					this.valor +=5;
					//this.$refs.myP.innerHTML = "XXX";
					setTimeout(() => {
						vueAside.name = 'Cambio el nombre';
					}, 2000);
				},
				restar() {
					this.valor--;
				},
				destruir() {
					this.$destroy();
				}
			},
			beforeCreate() {
				alert("Antes de crear la instancia " + this.valor)
				console.log('Antes de crear la instancia');
			},
			created() {
				alert("Instancia creada " + this.valor)
				console.log('Instancia creada');
			},
			beforeMount() {
				alert("Antes de montar la instancia " + this.valor)
				console.log('Antes de montar la instancia');
			},
			mounted() {
				alert("Instancia montada " + this.valor)
				console.log('Instancia montada');
			},
			beforeUpdate() {
				alert("Antes de actualizar la instancia " + this.valor)
				console.log('Antes de actualizar la instancia');
			},
			updated() {
				alert("Instancia actualizada " + this.valor)
				console.log('Instancia actualizada');
			},
			beforeDestroy() {
				alert("Antes de destruir la instancia " + this.valor)
				console.log('Antes de destruir la instancia');
				this.$refs.myH1.style.color = 'green';
			},
			destroyed() {
				alert("Instancia destruida " + this.valor)
				console.log('Instancia destruida');
				//this.$refs.myH1.style.color = 'red';
				setTimeout(() => {
						vueAside.name = 'Mi ultimo adios';
					}, 2000);
				document.querySelector('#myH1').style.color = "red";
			}
		});
		// vueMain.name = "JS name"
		// vueMain.sumar();
		// vueMain.title = "Hola";
		// vueMain.$refs.myH1.style.color = 'red';
		// console.log(vueMain.$refs);

		const vueAside = new Vue({
			el: '#vueAside',
			data: {
				name: 'Instancia 02',
				valor: 2
			},
			methods: {
				sumar() {
					this.valor +=2;
					vueMain.valor +=2;
				},
				restar() {
					this.valor-=2;
					vueMain.valor -=2;
				}
			}
		});

	</script>

</body>

</html>
