<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <div id="app">
        <!-- <button v-on:click="contador++">Click!</button> -->
        <button v-on:mouseover="contador++">Click!</button>
        <p>Has hecho click en el botón: {{ contador }}</p>
        <!-- <button v-on:click.once="saludar('Pablo', 'Lopez')">Saludar + Resetear</button> -->
        <button v-on:click.once="saludar('Pablo', $event)">Saludar + Resetear</button>
    </div>

    <br>
    
    <div v-on:click="saludar('Juan', $event)">
        Mi div <p v-on:click="saludar('Veronica', $event)">mi parrafo</p> <span v-on:click="saludar('Sara', $event)">mi span</span>
    </div>
    <script>
        const { createApp } = Vue;

        createApp({
            data() {
                return {
                    contador: 0,
                }
            },
            methods: {
                saludar(nombrePersona, apellidoPersona) {
                    console.log("Hola", nombrePersona, apellidoPersona);
                    console.log(event.target.tagName);
                    this.contador = 0;
                }
            }
            
        }).mount('#app')
    </script>

</body>
</html>
