<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <div id="app">
        <!-- <button v-on:click="contador++">Click!</button> -->
        <button v-on:mouseover="contador++">Click!</button>
        <p>Has hecho click en el botón: {{ contador }}</p>
    </div>
    <script>
        const { createApp } = Vue;

        createApp({
            data() {
                return {
                    contador: 0,
                }
            },
            
        }).mount('#app')
    </script>

</body>
</html>
